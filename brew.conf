# mac-rebuild — Homebrew packages
#
# One Homebrew formula per line. Lines starting with # are ignored.
# Runs AFTER Homebrew itself is installed (via apps.conf's `homebrew` label).
# In --update mode, `brew upgrade` also runs against everything here.
#
# See: https://formulae.brew.sh/

# ── Languages / runtimes ──
python                     # Python 3.13+ with pip (Homebrew's `python` = latest stable)
uv                         # Astral's fast Python installer + venv manager
                           # (the modern replacement for pyenv + pip-tools)

# ── Prompt + fonts ──
oh-my-posh                 # shell prompt engine (cross-shell, themeable)
font-meslo-lg-nerd-font    # Nerd Font — powerline glyphs + icons for OMP

# ── AI CLIs ──
codex                      # OpenAI Codex CLI (cask)

# ── Apps whose Installomator labels are broken (July 2026) ──
# These are Homebrew casks that install to /Applications like any other Mac
# app. `brew install <name>` auto-detects cask vs formula.
bartender                  # Menu bar organizer (v6.5.2 latest)
tigervnc                   # TigerVNC — free open-source VNC client

# ── Media ──
ffmpeg                     # audio/video swiss-army knife
yt-dlp                     # download from YouTube / most video sites
imagemagick                # image conversion / resizing / batch ops

# ── CLI quality of life ──
gh                         # GitHub CLI — auth, PRs, issues, gh copilot
jq                         # JSON slicer
yq                         # YAML slicer (jq for YAML)
ripgrep                    # faster grep (rg)
fd                         # faster find
bat                        # cat with syntax highlighting
eza                        # modern ls (replaces exa)
htop                       # interactive process viewer
tree                       # directory tree
wget                       # download utility
mas                        # Mac App Store CLI — install/update MAS apps
