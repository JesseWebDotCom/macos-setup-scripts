# mac-rebuild — app list
#
# One Installomator label per line. Lines starting with # are ignored.
# See the full label list: https://github.com/Installomator/Installomator/blob/main/Labels.txt
#
# To add an app, drop its label here.
# To skip one, comment it out.

# ── Browsers ──
googlechromepkg
firefoxpkg

# ── Terminal / dev ──
ghostty
# Homebrew is installed by setup.sh directly via the official install script
# (see work_brewpackages) — Installomator's `homebrew` label uses a .pkg that
# reports success but sometimes leaves nothing on disk when installed as root.
# Command Line Developer Tools (git, clang, make…) is installed by
# bootstrap.sh before this script runs. No label needed.

# ── AI ──
claudedesktop
chatgpt
# Claude Code CLI is installed by setup.sh via Anthropic's native installer
# (self-updating) — no Installomator label needed.

# ── Media ──
vlc
plexdesktop

# ── Utilities ──
keka                       # RAR/7z/rare archive formats macOS can't open
alttab                     # Windows-style Alt-Tab window switcher w/ previews
                           # (open source; the modern "aero peek" for Mac)
hazel                      # Automated file & folder rules (v6 latest)
tailscale                  # Mesh VPN — reach your other machines from anywhere
# bartender — Installomator's label points at a 404'd URL as of July 2026.
# Installed via Homebrew cask instead (see brew.conf).
balenaetcher               # Flash OS images to USB drives / SD cards

# ── Audio ──
rogueamoebasoundsource5    # SoundSource — label lags at "5" but installs v6+
                           # via Rogue Amoeba's Sparkle feed

# ── Remote access ──
microsoftwindowsapp        # Microsoft's Windows App (successor to Remote
                           # Desktop) — for RDP to Windows / Azure VMs / W365
# realvncviewer — Installomator's label points at a 404'd URL as of July 2026.
# Installed via Homebrew cask `vnc-viewer` instead (see brew.conf).
# Note: RealVNC is transitioning to subscription (RealVNC Connect); the free
# viewer still works for host-to-host VNC but may lose features over time.
# jumpdesktop              # Alternative: fancier VNC+RDP client (paid)

# ── Optional: window manager ──
# macOS 27 Golden Gate ships native tiling (halves/quarters/fill via
# Fn+Ctrl+Arrow). Native tiling doesn't do thirds/sixths or saved layouts —
# uncomment Rectangle if you need those. Free and MIT-licensed; does more
# than Magnet's $9.99 for zero cost.
# rectangle
